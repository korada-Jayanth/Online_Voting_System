spring:
  datasource:
    url: jdbc:h2:mem:electiondb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false
