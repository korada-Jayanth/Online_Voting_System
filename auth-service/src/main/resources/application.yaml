server:
  port: 8081

spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  application:
    name: auth-service

  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/voting_auth_db}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET:mysecretkeymysecretkeymysecretkey}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
